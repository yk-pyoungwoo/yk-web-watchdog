		access_log /var/log/nginx/access.log combined if=$loggable;
		return 301 https://www.yklawfirm-school.co.kr$request_uri;
	}

	server {
		listen 80;
		server_name www.yklawfirm-school.co.kr;

		access_log /var/log/nginx/access.log combined if=$loggable;
		access_log /var/log/nginx/cache-access.log cache_status;

		absolute_redirect off;
		port_in_redirect off;

		location / {
			proxy_pass http://127.0.0.1:3008;

			proxy_cache SCHOOL_CACHE;
			proxy_cache_methods GET HEAD;
			proxy_cache_valid 200 30d;
			proxy_cache_valid 301 302 1h;
			proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
			proxy_cache_lock on;
			proxy_cache_lock_timeout 10s;

			proxy_ignore_headers Cache-Control Expires Set-Cookie;
			proxy_hide_header Set-Cookie;

			proxy_cache_key "$scheme$host$uri$cache_query_string";

			add_header X-Cache-Status $upstream_cache_status always;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location = /robots.txt {
			root /data/homepage/apps/school/public;
			add_header Content-Type text/plain;
			try_files /robots.txt =404;
			access_log off;
		}
		location = /sitemap.xml {
			root /data/homepage/apps/school/public;
			add_header Content-Type application/xml;
			try_files /sitemap.xml =404;
			access_log off;
		}
	}
}
