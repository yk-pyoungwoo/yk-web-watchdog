# =============================================================================
# yklawfirm 홈페이지군 — nginx 메인 설정 (참고용 / VM 배포 시 실제 경로에 맞게 반영)
#
# 구성 요약:
#   - Azure VM, worker 사용자 azure
#   - 사이트별 Next.js (127.0.0.1:3000~3008) 리버스 프록시 + 디스크 proxy_cache
#   - 구 도메인/경로 리다이렉트는 include 및 map(if)로 처리
#   - 캐시 키: $uri + 추적 파라미터 제거한 쿼리 ($cache_query_string)
#   - 캐시 적중 여부: 응답 헤더 X-Cache-Status, 전용 access_log cache-access.log
# =============================================================================

# 프로세스가 root로 기동될 때만 의미 있음. 일반 reload 시 무시될 수 있음.
user azure;

# CPU 코어 수에 맞춰 worker 수 자동 결정.
worker_processes auto;

pid /run/nginx.pid;

# 전역 에러 로그. 레벨은 필요 시 notice / info / debug 로 조정.
error_log /var/log/nginx/error.log;

# 동적 모듈 로드 (예: stream, geoip 등). 없으면 빈 디렉터리여도 무방.
include /etc/nginx/modules-enabled/*.conf;

events {
	# worker당 동시 접속 상한. 트래픽에 따라 조정.
	worker_connections 768;

	# 한 accept 루프에서 여러 소켓을 한 번에 받음. 지연·CPU 트레이드오프 있음.
	# multi_accept on;
}

http {
	##
	# 프록시 캐시 디스크 경로 (사이트/앱별로 분리 — 키 충돌·무효화 범위 분리)
	#
	# levels=1:2  : 캐시 파일을 2단 하위 디렉터리에 분산 (inode/디렉터리 부하 완화)
	# keys_zone=NAME:size : 메모리에 메타데이터(키·만료 등) 보관. size는 zone 크기.
	# inactive=60m : 해당 기간 접근 없으면 디스크 항목 제거 (LRU 성격)
	# max_size=10g : 디스크 캐시 상한 (존당, 초과 시 오래된 것부터 정리)
	# use_temp_path=off : 임시 파일을 캐시와 같은 파일시스템에 두어 rename 비용 감소
	##
	proxy_cache_path /data/nginx_cache/brand levels=1:2 keys_zone=BRAND_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/crime levels=1:2 keys_zone=CRIME_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/divorce levels=1:2 keys_zone=DIVORCE_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/civil levels=1:2 keys_zone=CIVIL_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/assault levels=1:2 keys_zone=ASSAULT_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/inherit levels=1:2 keys_zone=INHERIT_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/drug levels=1:2 keys_zone=DRUG_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/traffic levels=1:2 keys_zone=TRAFFIC_CACHE:256m inactive=60m max_size=10g use_temp_path=off;
	proxy_cache_path /data/nginx_cache/school levels=1:2 keys_zone=SCHOOL_CACHE:256m inactive=60m max_size=10g use_temp_path=off;

	# map 지시어 해시 테이블 크기. 키(문자열)가 많을 때 bucket/ max 조정.
	map_hash_bucket_size 256;
	map_hash_max_size 4096;

	# $변수 이름·map 개수가 많아지면 "could not build variables_hash" 방지용으로 상향.
	variables_hash_max_size 8192;
	variables_hash_bucket_size 128;

	##
	# 기본 전송·타입
	##
	# 커널 sendfile로 정적/프록시 응답 전송 시 복사 최소화.
	sendfile on;
	# 패킷에 여러 작은 응답을 묶어 네트워크 효율 향상 (sendfile과 함께 자주 사용).
	tcp_nopush on;
	types_hash_max_size 2048;
	# keep-alive 연결 유지 시간(초). 클라이언트·LB 정책과 맞출 것.
	keepalive_timeout 65;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL (이 파일의 server는 대부분 listen 80만 있으나, 다른 include에서 ssl 사용 시 공통 적용)
	##
	# TLS 1.0/1.1은 구 클라이언트 호환용. 보안 정책에 따라 1.2+만 남겨도 됨.
	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
	ssl_prefer_server_ciphers on;

	##
	# 쿼리 스트링 정규화 → proxy_cache_key 에 쓰일 $cache_query_string
	#
	# 배경:
	#   $request_uri 를 그대로 쓰면 utm_source 등만 다른 URL이 서로 다른 캐시 키가 되어
	#   MISS가 과다하게 발생함.
	# 구현:
	#   nginx map 은 한 번에 하나의 패턴만 안전하게 제거하기 어려워, 동일 규칙을
	#   qs_u01 … qs_u10 까지 10번 반복 적용 (utm_* 파라미터 최대 10개 제거 가정).
	#   이후 gclid → gcl_keyword, gcl_network, gad_source, gad_campaignid → fbclid, msclkid, dclid, yclid → NaPm(네이버 BSA 등) 제거.
	#   앞뒤 & 정리, 연속 && 를 & 로 치환 (trim1~trim3).
	# 최종:
	#   $cache_query_string = "" 이면 쿼리 없음 → 키에 ? 붙이지 않음.
	#   값이 있으면 "?정리된쿼리" 형태 (proxy_cache_key 에 $uri 와 이어붙임).
	#
	# 주의:
	#   keyword, type 등 비즈니스 쿼리는 제거하지 않음 — 내용이 다른 페이지는 다른 키.
	#   utm 이 10개 초과면 일부가 키에 남을 수 있음 → 필요 시 qs_u11 체인 추가.
	##
	map $args $qs_u01 {
		default $args;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u01 $qs_u02 {
		default $qs_u01;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u02 $qs_u03 {
		default $qs_u02;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u03 $qs_u04 {
		default $qs_u03;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u04 $qs_u05 {
		default $qs_u04;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u05 $qs_u06 {
		default $qs_u05;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u06 $qs_u07 {
		default $qs_u06;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u07 $qs_u08 {
		default $qs_u07;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u08 $qs_u09 {
		default $qs_u08;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	map $qs_u09 $qs_u10 {
		default $qs_u09;
		~^utm_[^=]+=[^&]*&(.*)$ $1;
		~^utm_[^=]+=[^&]*$ "";
		~^(.*)&utm_[^=]+=[^&]*&(.*)$ $1&$2;
		~^(.*)&utm_[^=]+=[^&]*$ $1;
	}
	# Google Ads 클릭 ID
	map $qs_u10 $qs_g1 {
		default $qs_u10;
		~^gclid=[^&]*&(.*)$ $1;
		~^gclid=[^&]*$ "";
		~^(.*)&gclid=[^&]*&(.*)$ $1&$2;
		~^(.*)&gclid=[^&]*$ $1;
	}
	# Google Ads 부가 파라미터(PMax 등에서 붙음, 캐시 키 정규화용 — 브라우저 요청 URL은 변경 없음)
	map $qs_g1 $qs_gkw {
		default $qs_g1;
		~^gcl_keyword=[^&]*&(.*)$ $1;
		~^gcl_keyword=[^&]*$ "";
		~^(.*)&gcl_keyword=[^&]*&(.*)$ $1&$2;
		~^(.*)&gcl_keyword=[^&]*$ $1;
	}
	map $qs_gkw $qs_gnet {
		default $qs_gkw;
		~^gcl_network=[^&]*&(.*)$ $1;
		~^gcl_network=[^&]*$ "";
		~^(.*)&gcl_network=[^&]*&(.*)$ $1&$2;
		~^(.*)&gcl_network=[^&]*$ $1;
	}
	map $qs_gnet $qs_gsrc {
		default $qs_gnet;
		~^gad_source=[^&]*&(.*)$ $1;
		~^gad_source=[^&]*$ "";
		~^(.*)&gad_source=[^&]*&(.*)$ $1&$2;
		~^(.*)&gad_source=[^&]*$ $1;
	}
	map $qs_gsrc $qs_gcamp {
		default $qs_gsrc;
		~^gad_campaignid=[^&]*&(.*)$ $1;
		~^gad_campaignid=[^&]*$ "";
		~^(.*)&gad_campaignid=[^&]*&(.*)$ $1&$2;
		~^(.*)&gad_campaignid=[^&]*$ $1;
	}
	# Facebook 클릭 ID
	map $qs_gcamp $qs_f1 {
		default $qs_gcamp;
		~^fbclid=[^&]*&(.*)$ $1;
		~^fbclid=[^&]*$ "";
		~^(.*)&fbclid=[^&]*&(.*)$ $1&$2;
		~^(.*)&fbclid=[^&]*$ $1;
	}
	# Microsoft Ads
	map $qs_f1 $qs_m1 {
		default $qs_f1;
		~^msclkid=[^&]*&(.*)$ $1;
		~^msclkid=[^&]*$ "";
		~^(.*)&msclkid=[^&]*&(.*)$ $1&$2;
		~^(.*)&msclkid=[^&]*$ $1;
	}
	# DoubleClick 등
	map $qs_m1 $qs_d1 {
		default $qs_m1;
		~^dclid=[^&]*&(.*)$ $1;
		~^dclid=[^&]*$ "";
		~^(.*)&dclid=[^&]*&(.*)$ $1&$2;
		~^(.*)&dclid=[^&]*$ $1;
	}
	# Yahoo 등
	map $qs_d1 $qs_y1 {
		default $qs_d1;
		~^yclid=[^&]*&(.*)$ $1;
		~^yclid=[^&]*$ "";
		~^(.*)&yclid=[^&]*&(.*)$ $1&$2;
		~^(.*)&yclid=[^&]*$ $1;
	}
	# 네이버 검색광고(BSA) 등 NaPm=… (값에 % 인코딩 포함, & 전까지 한 덩어리로 제거)
	map $qs_y1 $qs_napm {
		default $qs_y1;
		~^NaPm=[^&]*&(.*)$ $1;
		~^NaPm=[^&]*$ "";
		~^(.*)&NaPm=[^&]*&(.*)$ $1&$2;
		~^(.*)&NaPm=[^&]*$ $1;
		~^napm=[^&]*&(.*)$ $1;
		~^napm=[^&]*$ "";
		~^(.*)&napm=[^&]*&(.*)$ $1&$2;
		~^(.*)&napm=[^&]*$ $1;
	}
	# 제거 후 선행/후행 & 제거
	map $qs_napm $qs_trim1 {
		default $qs_napm;
		~^&+(.*)$ $1;
		~^(.*)&+$ $1;
	}
	# 연속 & 를 한 번에 하나로 (패턴이 남을 수 있어 2회 map)
	map $qs_trim1 $qs_trim2 {
		default $qs_trim1;
		~^(.*)&&+(.*)$ $1&$2;
	}
	map $qs_trim2 $qs_trim3 {
		default $qs_trim2;
		~^(.*)&&+(.*)$ $1&$2;
	}
	# 빈 쿼리는 "" — proxy_cache_key 에서 $uri 만 사용되도록 (? 없음)
	map $qs_trim3 $cache_query_string {
		""      "";
		default "?$qs_trim3";
	}

	##
	# access_log 필터용: 200/206 는 combined 로그에서 제외(용량 절감 등 기존 정책)
	# if=$loggable 에서 0 이면 해당 요청 줄은 기록하지 않음.
	##
	map $status $loggable {
		200 0;
		206 0;
		default 1;
	}

	##
	# 캐시 분석 전용 access 로그 포맷
	#
	# $upstream_cache_status 주요 값:
	#   MISS     — 캐시에 없어 업스트림에서 가져옴
	#   HIT      — 캐시에서 즉시 응답
	#   STALE    — 만료됐으나 proxy_cache_use_stale 조건으로 오래된 캐시 제공
	#   UPDATING — 백그라운드 갱신 중 stale 응답
	#   REVALIDATED — 재검증 후 304 등
	#   BYPASS   — 캐시 사용 안 함
	#   EXPIRED  — 캐시 만료로 재검증/재요청
	#
	# 로그 용량: Nginx만으로는 로그 삭제·회전 불가. 동일 레포의 logrotate-yklawfirm.conf 를
	# VM 의 /etc/logrotate.d/ 에 배포해 access.log / cache-access.log / error.log 를
	# 일별·maxsize 초과 시 회전·압축·보관 개수 제한(rotate).
	# cache-access.log 는 VM에서 생성·쓰기 가능해야 하며, 기본 nginx logrotate 와 경로가 겹치면 규칙 통합.
	##
	log_format cache_status '$time_iso8601\t$server_name\t'
		'"$request"\t$status\t'
		'cache=$upstream_cache_status\t'
		'request_time=$request_time\t'
		'upstream_time=$upstream_response_time\t'
		'bytes=$body_bytes_sent\t'
		'"$http_user_agent"';

	gzip on;

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;

	# 구 홈페이지 도메인별 리다이렉트 규칙 (별도 파일에 map/set 변수 정의 가능)
	include /data/old_hp_redirect/yklawfirm.co.kr.conf;
	include /data/old_hp_redirect/yklawfirm.net.conf;
	include /etc/nginx/old_hp_redirect/yklaw.net.conf;
	include /etc/nginx/old_hp_redirect/yklaw.kr.conf;

	##
	# www.yklawfirm.co.kr — 구 /brand/board/* 쿼리·경로 → 신 URL 로 301 할 때 쓰는 map
	##

	# ?page= 없으면 페이지 1로 간주 (리다이렉트 로직에서 사용 시)
	map $arg_page $page {
		""      1;
		default $arg_page;
	}

	# 구 검색 type 문자열 → 신 /search?type= 숫자 코드
	map $arg_type $search_type {
		""                "";
		ALL               1;
		businessCategory  2;
		businessCase      3;
		reviews           4;
		qa                5;
		lawyer            6;
		mediaNews         7;
		youtube           8;
		classAction       9;
		company           10;
		default           "";
	}

	# 검색 키워드 정규화 (공백 포함 키워드와 URL 인코딩 조합 대응)
	map $arg_keyword $search_keyword {
		default         $arg_keyword;
		"이혼 절차"     "이혼절차";
	}

	# 구 business-case 등 tab 숫자 → /case/{slug}
	map $arg_tab $case_tab_slug {
		""     "";
		ALL    "all";
		53     "detective";
		54     "sexual-assault";
		55     "school-violence";
		56     "drug";
		57     "traffic";
		58     "corporate";
		59     "iprs";
		61     "estate";
		62     "divorce";
		63     "civil";
		64     "inherit";
		65     "military";
		66     "sapa";
		67     "labor";
		default "";
	}

	# blog / qna 등 tabCategory → /blog/{slug}, /qna/{slug}
	map $arg_tabCategory $tab_category_slug {
		""     "";
		ALL    "all";
		53     "detective";
		54     "sexual-assault";
		55     "school-violence";
		56     "drug";
		57     "traffic";
		58     "corporate";
		59     "iprs";
		61     "estate";
		62     "divorce";
		63     "civil";
		64     "inherit";
		65     "military";
		66     "sapa";
		67     "labor";
		default "";
	}

	# 구 lawyer 보기 lawyerType → /member/{slug}
	map $arg_lawyerType $lawyer_type_slug {
		""   "";
		ALL  "all";
		1    "lawyer";
		16   "advisory";
		17   "expert";
		643  "consultant";
		default "";
	}

	##
	# INTERNAL — 카카오 브릿지 (내부용 호스트 kakao-1 … kakao-10)
	# 정적 HTML + try_files. 프록시 캐시 없음.
	##
	server {
		listen 80;
		server_name kakao-1.yklawfirm.co.kr kakao-2.yklawfirm.co.kr kakao-3.yklawfirm.co.kr
			kakao-4.yklawfirm.co.kr kakao-5.yklawfirm.co.kr kakao-6.yklawfirm.co.kr
			kakao-7.yklawfirm.co.kr kakao-8.yklawfirm.co.kr kakao-9.yklawfirm.co.kr
			kakao-10.yklawfirm.co.kr;
		access_log /var/log/nginx/access.log combined if=$loggable;

		root /etc/nginx/kakao-bridge/internal;
		index kakao-bridge.html;

		location / {
			try_files $uri /kakao-bridge.html;
		}

		location ~* \.(css|js)$ {
			expires 1d;
			add_header Cache-Control "public, immutable";
		}
	}

	##
	# EXTERNAL — 카카오 브릿지 (블로그/카페/당근/지식 등 공개 채널)
	##
	server {
		listen 80;
		server_name kakao-blog.yklawfirm.co.kr;
		access_log /var/log/nginx/access.log combined if=$loggable;

		root /etc/nginx/kakao-bridge/external;
		index kakao-bridge.html;

		location / {
