user azure;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {
        proxy_cache_path /data/nginx_cache/brand levels=1:2 keys_zone=BRAND_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/crime levels=1:2 keys_zone=CRIME_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/divorce levels=1:2 keys_zone=DIVORCE_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/civil levels=1:2 keys_zone=CIVIL_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/assault levels=1:2 keys_zone=ASSAULT_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/inherit levels=1:2 keys_zone=INHERIT_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/drug levels=1:2 keys_zone=DRUG_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/traffic levels=1:2 keys_zone=TRAFFIC_CACHE:256m inactive=60m max_size=80g use_temp_path=off;
        proxy_cache_path /data/nginx_cache/school levels=1:2 keys_zone=SCHOOL_CACHE:256m inactive=60m max_size=80g use_temp_path=off;

	map_hash_bucket_size 256;
	map_hash_max_size 4096;
	variables_hash_max_size    2048;
	variables_hash_bucket_size 128;

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	types_hash_max_size 2048;
        keepalive_timeout 65;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
        map $status $loggable {
            200     0;
            206     0;
            default 1;
        }

	##
	# Gzip Settings
	##

	gzip on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	# gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;

        include /data/old_hp_redirect/yklawfirm.co.kr.conf;
        include /data/old_hp_redirect/yklawfirm.net.conf;
	include /etc/nginx/old_hp_redirect/yklaw.net.conf;
        include /etc/nginx/old_hp_redirect/yklaw.kr.conf;


        map $arg_page $page {
            ""      1;          # ?page= 없으면 1
            default $arg_page;  # 있으면 그 값 그대로
        }
        # type 파라미터 → 숫자 코드 매핑
        map $arg_type $search_type {
            ""                "";   # type 파라미터가 아예 없는 경우
            ALL               1;
            businessCategory  2;
            businessCase      3;
            reviews           4;
            qa                5;
            lawyer            6;
            mediaNews         7;
            youtube           8;
            classAction       9;
            company           10;
            default           "";   # 알 수 없는 type 값 → 11
        }
        # keyword 정규화 (기본은 그대로, 이혼 절차만 붙여쓰기)
        map $arg_keyword $search_keyword {
            default         $arg_keyword;  # 기본은 원래 값 그대로
            "이혼 절차"     "이혼절차";    # /brand/search?keyword=이혼+절차 → "이혼 절차" 로 들어옴
            # 필요하면 여기서 추가로 보이스피싱/마약 등도 특별 처리 가능
        }
        # tab → slug 매핑
        map $arg_tab $case_tab_slug {
            ""     "";             # tab 값이 없으면 redirect 안 함
            ALL    "all";
            53     "detective";
            54     "sexual-assault";
            55     "school-violence";
            56     "drug";
            57     "traffic";
            58     "corporate";
            59     "iprs";
            61     "estate";
            62     "divorce";
            63     "civil";
            64     "inherit";
            65     "military";
            66     "sapa";
            67     "labor";
            default "";
        }
        # tabCategory → slug 매핑
        map $arg_tabCategory $tab_category_slug {
            ""     "";             # tabCategory 값이 없으면 redirect 안 함
            ALL    "all";
            53     "detective";
            54     "sexual-assault";
            55     "school-violence";
            56     "drug";
            57     "traffic";
            58     "corporate";
            59     "iprs";
            61     "estate";
            62     "divorce";
            63     "civil";
            64     "inherit";
            65     "military";
            66     "sapa";
            67     "labor";
            default "";
        }
        map $arg_lawyerType $lawyer_type_slug {
            ""   "";              # lawyerType 없는 경우
            ALL  "all";
            1    "lawyer";
            16   "advisory";
            17   "expert";
            643  "consultant";
            default "";
        }

        # INTERNAL
        # KAKAO BRIDGE - kakao-1 ~ kakao-10.yklawfirm.co.kr
        server {
            listen 80;
            server_name kakao-1.yklawfirm.co.kr kakao-2.yklawfirm.co.kr kakao-3.yklawfirm.co.kr
                        kakao-4.yklawfirm.co.kr kakao-5.yklawfirm.co.kr kakao-6.yklawfirm.co.kr
                        kakao-7.yklawfirm.co.kr kakao-8.yklawfirm.co.kr kakao-9.yklawfirm.co.kr
