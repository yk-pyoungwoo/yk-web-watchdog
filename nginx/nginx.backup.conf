            access_log /var/log/nginx/access.log combined if=$loggable;

            root /etc/nginx/kakao-bridge/internal;
            index kakao-bridge.html;

            location / {
                try_files $uri /kakao-bridge.html;
            }

            location ~* \.(css|js)$ {
                expires 1d;
                add_header Cache-Control "public, immutable";
            }
        }

