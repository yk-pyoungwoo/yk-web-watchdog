        # BRAND  

        server {
            listen 80;
            server_name yklawfirm.co.kr;
	    access_log /var/log/nginx/access.log combined if=$loggable;
	    return 301 https://www.yklawfirm.co.kr$request_uri;
	}

        server {
            listen 80;
            server_name www.yklawfirm.co.kr;

	    access_log /var/log/nginx/access.log combined if=$loggable;

            absolute_redirect off;
            port_in_redirect off;

            ####### 리다이렉트 처리
            # 숫자 ID 케이스: /brand/board/collective-action/8182 → /collective-action/8182
            location ~ ^/brand/board/collective-action/([0-9]+)$ {
                return 301 /collective-action/$1;
            }
            # keyword 검색: /brand/board/collective-action?keyword=xxx → /collective-action?keyword=xxx
            location = /brand/board/collective-action {
                if ($arg_keyword != "") {
                    return 301 /collective-action?keyword=$arg_keyword;
                }

                # keyword 없으면 그냥 /collective-action 으로
                return 301 /collective-action;
            }
            # /brand/search 전용 리다이렉트
            location = /brand/search {
                # 1) type 파라미터가 있으면 type 기준으로 리다이렉트
                if ($search_type != "") {
                    return 301 /search?type=$search_type;
                }

                # 2) type은 없고 keyword만 있으면 keyword 검색으로 리다이렉트
                if ($search_keyword != "") {
                    return 301 /search?keyword=$search_keyword;
                }

                # 3) 둘 다 없으면 그냥 /search 로
                return 301 /search;
            }
            # 1) news 상세
            location ~ ^/brand/board/news/([0-9]+)$ {
                return 301 /broadcast/article/$1;
            }
            # 2) news 리스트/검색
            location = /brand/board/news {
                if ($arg_keyword != "") {
                    return 301 /search?keyword=$arg_keyword&type=7;
                }
                return 301 /broadcast/all;
            }
            # /brand/board/business-case 전용 리다이렉트
            location = /brand/board/business-case {
                # category가 한 글자라도 있으면 → 전부 /search 로
                if ($arg_category != "") {
                    return 301 /search;
                }
                # tab 값이 정상적으로 매핑될 때
                if ($case_tab_slug != "") {
                    return 301 /case/$case_tab_slug;
                }
                # tab 값이 없으면 그냥 /case/all 로 보내기
                return 301 /case/all;
            }
            # /brand/board/client-review 전용 리다이렉트
            location = /brand/board/client-review {
                # tab 값이 정상적으로 매핑될 때
                if ($case_tab_slug != "") {
                    return 301 /client-review/$case_tab_slug;
                }
                # tab 값이 없으면 그냥 /client-review/all 로 보내기
                return 301 /client-review/all;
            }
            # /brand/board/blog 전용 리다이렉트
            location = /brand/board/blog {
                # keyword 검색이 최우선
                if ($arg_keyword != "") {
                    return 301 /search?keyword=$arg_keyword;
                }
                # tab 값이 정상적으로 매핑될 때
                if ($tab_category_slug != "") {
                    return 301 /blog/$tab_category_slug;
                }
                # tab 값이 없으면 그냥 /blog/all 로 보내기
                return 301 /blog/all;
            }
            # /brand/board/qna-lounge 전용 리다이렉트
            location = /brand/board/qna-lounge {
                # tab 값이 정상적으로 매핑될 때
                if ($tab_category_slug != "") {
                    return 301 /qna/$tab_category_slug;
                }
                # tab 값이 없으면 그냥 /qna/all 로 보내기
                return 301 /qna/all;
            }
            # /brand/board/lawyer 전용 리다이렉트
            location = /brand/board/lawyer {
                # lawyerType 값이 정상적으로 매핑될 때
                if ($lawyer_type_slug != "") {
                    return 301 /member/$lawyer_type_slug;
                }
                # lawyerType 값이 없으면 그냥 /member/all 로 보내기
                return 301 /member/all;
            }
            if ($old_yklawfirm_co_kr_redirect_by_full != "") {
                return 301 $old_yklawfirm_co_kr_redirect_by_full;
            }
            if ($old_yklawfirm_co_kr_redirect_by_path != "") {
                return 301 $old_yklawfirm_co_kr_redirect_by_path;
            }
            #######

            location / {
                proxy_pass http://127.0.0.1:3000;

                # --- 캐시 ---
                proxy_cache BRAND_CACHE;
                proxy_cache_methods GET HEAD;
                proxy_cache_valid 200 30d;
                proxy_cache_valid 301 302 1h;   # 필요시
                proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                proxy_cache_lock on;
                proxy_cache_lock_timeout 10s;

                # (중요) Next.js가 no-store/private/Set-Cookie 주더라도 캐시하고 싶다면:
                proxy_ignore_headers Cache-Control Expires Set-Cookie;
                proxy_hide_header Set-Cookie;

                # 캐시 키(기본도 되지만, 명시 추천)
                proxy_cache_key "$scheme$host$request_uri";

                # 디버깅
                add_header X-Cache-Status $upstream_cache_status always;

                # 기본 프록시 헤더
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # robots.txt와 sitemap.xml을 명시적으로 처리 (프록시보다 우선)
            location = /robots.txt {
                root /data/homepage/apps/brand/public;
                add_header Content-Type text/plain;
                try_files /robots.txt =404;
                access_log off;
            }
            location = /sitemap.xml {
                root /data/homepage/apps/brand/public;
                add_header Content-Type application/xml;
                try_files /sitemap.xml =404;
                access_log off;
            }
            location = /health_check {
                access_log off;
                return 200 "OK";
                add_header Content-Type text/plain;
            }
        }

