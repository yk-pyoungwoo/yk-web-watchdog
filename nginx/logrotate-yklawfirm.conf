# yklawfirm Nginx 로그 회전 (logrotate)
#
# 목표:
# - access.log       최대 약 10GB 유지
# - cache-access.log 최대 약 10GB 유지
# - error.log        최대 약 10GB 유지
#
# 방식:
# - 파일당 maxsize 1G, rotate 9
# - 현재 활성 파일(최대 약 1G) + 회전본 9개 => 파일당 약 10GB 수준
#
# 참고:
# - logrotate는 실행 시점에만 회전하므로 "정확히 10GB 절대 상한"은 아님.
# - Ubuntu 기본은 보통 일 1회 실행이므로, 급증 트래픽이면 일시적으로 더 커질 수 있음.
#
# 배포 예:
#   sudo cp /path/to/logrotate-yklawfirm.conf /etc/logrotate.d/yklawfirm-nginx
#   sudo chmod 644 /etc/logrotate.d/yklawfirm-nginx
#   sudo logrotate -d /etc/logrotate.d/yklawfirm-nginx   # 드라이런
#   sudo logrotate -f /etc/logrotate.d/yklawfirm-nginx   # 1회 강제 회전(선택)
#
# 주의:
# - /etc/logrotate.d/nginx 와 동일 로그 경로가 겹치면 중복 회전됩니다.
#   한 로그 파일은 하나의 규칙에서만 관리하세요.
# - create 소유자/그룹은 서버 실제 권한에 맞게 조정하세요.
#   ls -l /var/log/nginx/

/var/log/nginx/access.log {
	daily
	maxsize 1G
	rotate 9
	compress
	delaycompress
	missingok
	notifempty
	create 0640 www-data adm
	postrotate
		if [ -f /run/nginx.pid ]; then
			kill -USR1 "$(cat /run/nginx.pid)" 2>/dev/null || true
		fi
	endscript
}

/var/log/nginx/cache-access.log {
	daily
	maxsize 1G
	rotate 9
	compress
	delaycompress
	missingok
	notifempty
	create 0640 www-data adm
	postrotate
		if [ -f /run/nginx.pid ]; then
			kill -USR1 "$(cat /run/nginx.pid)" 2>/dev/null || true
		fi
	endscript
}

/var/log/nginx/error.log {
	daily
	maxsize 1G
	rotate 9
	compress
	delaycompress
	missingok
	notifempty
	create 0640 www-data adm
	postrotate
		if [ -f /run/nginx.pid ]; then
			kill -USR1 "$(cat /run/nginx.pid)" 2>/dev/null || true
		fi
	endscript
}
